<!<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* نفس الخلفية المتدرجة */
            background: linear-gradient(135deg, #87CEEB, #2E8B57);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        form {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 20px; }

        input { 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            width: 100%; 
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button { 
            padding: 12px; 
            background: #2E8B57; 
            border: none; 
            color: white; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover { background: #226b42; }
    </style>
</head>
<body>

    <form method="post">
        <h2>تسجيل الدخول</h2>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">دخول</button>
        
        <p style="margin-top: 20px; color: #555; font-size: 14px;">
            ليس لديك حساب؟ 
            <a href="{% url 'register' %}" style="color: #2E8B57; text-decoration: none; font-weight: bold;">أنشئ حساباً جديداً</a>
        </p>
    </form>

</body>
</html>
