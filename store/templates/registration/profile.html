<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | CREST</title>
    <style>
        body {
            font-family: Arial, sans-serif; margin: 0; padding: 20px; min-height: 100vh;
            background-image: radial-gradient(at 80% 20%, #06b6d4 0px, transparent 50%), radial-gradient(at 20% 80%, #d946ef 0px, transparent 50%), radial-gradient(at 50% 40%, #6366f1 0px, transparent 60%), linear-gradient(135deg, #0b071e 0%, #1a103c 100%);
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* تنسيق بطاقة الملف الشخصي */
        .profile-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px; border-radius: 20px; width: 100%; max-width: 450px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .profile-icon {
            font-size: 60px; margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }

        .profile-name {
            font-size: 28px; 
            font-weight: bold; 
            margin-bottom: 5px;
            color: #420079; /* يمكنك تغيير #ffffff إلى أي لون تريده */
        }
        .profile-info {
            font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 30px;
        }

        .btn-home {
            background: linear-gradient(90deg, #7c3aed, #4f46e5); color: white;
            border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer;
            font-size: 16px; font-weight: bold; text-decoration: none;
            display: inline-block; transition: all 0.3s;
        }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-icon">👤</div>
        <div class="profile-name">{{ user.username }}</div>
        
        <div class="profile-info">
            <p><strong>حالة الحساب:</strong> نشط 🟢</p>
            {% if user.email %}
                <p><strong>البريد الإلكتروني:</strong> <br> {{ user.email }}</p>
            {% endif %}
            <p><strong>تاريخ الانضمام:</strong> <br> {{ user.date_joined|date:"d M Y" }}</p>
        </div>

        <a href="{% url 'home' %}" class="btn-home">🏠 العودة للصفحة الرئيسية</a>
    </div>

</body>
</html>
