{% extends "admin/base_site.html" %}
{% load static %}

{% block extrastyle %}
<style>
    /* 1. إخفاء العنوان الافتراضي */
    #site-name, h1, .breadcrumbs { display: none !important; }

    /* 2. الخلفية المتموجة (التي أردتها) */
    body {
        background: radial-gradient(circle at 20% 0%, #8B5CF6 0%, transparent 60%),
                    radial-gradient(circle at 80% 100%, #06b6d4 0%, transparent 60%),
                    linear-gradient(135deg, #4c1d95 0%, #164e63 100%) !important;
        background-attachment: fixed !important;
        color: #fff !important;
    }

    /* 3. تنسيق المحتوى (حاوية زجاجية شفافة) */
    #container { 
        background: rgba(0,0,0,0.4) !important; 
        backdrop-filter: blur(10px);
        border-radius: 15px !important; 
        padding: 20px !important;
        margin: 20px !important;
    }

    /* 4. جعل النصوص واضحة */
    #user-tools { font-size: 1.2rem !important; margin-bottom: 20px; }
    #user-tools a { color: #fff !important; font-weight: bold; }
    
    /* 5. تنسيق الجداول لتكون متوافقة مع الخلفية */
    .module, table, th, td { 
        background: rgba(255,255,255,0.05) !important; 
        color: white !important; 
        border-color: rgba(255,255,255,0.1) !important;
    }
</style>
{% endblock %}
