<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع بالبطاقة الذهبية</title>
    <<style>
        body {
            margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(135deg, #e6d708 0%, #112847 70%);
            color: #e6edf3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        .checkout-container {
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px; border-radius: 20px; 
            width: 90%; /* تعديل مهم للهواتف */
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            box-sizing: border-box; /* يمنع خروج الصندوق عن الشاشة */
        }
        h2 { color: #d4af37; margin-bottom: 25px; text-align: center; letter-spacing: 1px; }
        .info-box { 
            background: rgba(212, 175, 55, 0.1); 
            padding: 20px; border-radius: 12px; margin-bottom: 25px; 
            border-right: 4px solid #d4af37; 
        }
        .info-box p { margin: 10px 0; color: #fff; font-size: 14px; } /* تصغير الخط قليلاً */
        
        input[type="text"] {
            width: 100%; padding: 15px; margin-top: 10px; 
            background: #0a192f; border: 1px solid #d4af37; 
            border-radius: 8px; color: white; box-sizing: border-box;
        }
        
        .btn-confirm {
            width: 100%; padding: 15px; margin-top: 20px; 
            background: #d4af37; border: none; border-radius: 8px; 
            color: #0a192f; font-weight: bold; cursor: pointer; font-size: 16px;
            transition: 0.3s;
        }
        .btn-confirm:hover { background: #c5a028; }

        /* --- كود دعم الهواتف --- */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .checkout-container { padding: 25px 15px; }
            h2 { font-size: 20px; }
            input[type="text"], .btn-confirm { padding: 12px; }
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>💳 الدفع بالبطاقة الذهبية</h2>
    <p style="text-align: center; color: #b0c4de;">لإتمام طلبك عبر التحويل، يرجى استخدام المعلومات التالية:</p>
    
    <div class="info-box">
        <p><strong>رقم الحساب (RIP):</strong> 00799999001234567890</p>
        <p><strong>اسم صاحب الحساب:</strong> نيون ستور</p>
    </div>

  <form method="POST" action="{% url 'ccp_checkout' %}">
    {% csrf_token %}
    <input type="text" name="transaction_id" placeholder="أدخل رقم العملية..." required>
    <button type="submit" class="btn-confirm">تأكيد إتمام الدفع</button>
</form>
</div>

</body>
</html>
